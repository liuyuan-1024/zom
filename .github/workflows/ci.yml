name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Boundary + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            ripgrep \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev

      - name: Check crate boundaries
        run: ./scripts/check-boundaries.sh

      - name: Check architecture naming sync
        run: |
          if rg -n "zom-input|zom_input" Cargo.toml crates apps docs scripts; then
            echo "Found stale zom-input references; please migrate to zom-core::input." >&2
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace --locked
